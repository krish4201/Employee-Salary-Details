name: Build and Deploy CAP App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build CAP project
        run: npx cds build --production

      - name: Install MBT
        run: npm install -g mbt

      - name: Build MTA archive
        run: mbt build -p=cf -t=.

      # Optional: Deploy to SAP BTP (Cloud Foundry)
      # Requires secrets configured in GitHub
      - name: Install CF CLI
        run: |
          wget https://packages.cloudfoundry.org/stable?release=linux64-binary&source=github -O cf.tgz
          tar -xvf cf.tgz
          sudo mv cf /usr/local/bin

      - name: Login to CF
        run: |
          cf api ${{ secrets.CF_API }}
          cf auth ${{ secrets.CF_USER }} ${{ secrets.CF_PASSWORD }}
          cf target -o ${{ secrets.CF_ORG }} -s ${{ secrets.CF_SPACE }}

      - name: Deploy MTA
        run: cf deploy mta_archives/*.mtar
