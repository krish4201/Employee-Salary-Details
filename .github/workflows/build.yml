_schema-version: "3.3"
ID: empsaldetails-management
version: 1.0.0

parameters:
  enable-parallel-deployments: true      

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npx cds build --production

modules:

  - name: empsaldetails-srv
    type: nodejs
    path: gen/srv

    parameters:
      memory: 512M
      disk-quota: 512M

    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

    requires:
      - name: empsaldetails-db
      - name: empsaldetails-xsuaa
      - name: empsaldetails-destination

    build-parameters:
      builder: npm-ci

  - name: empsaldetails-db-deployer
    type: hdb

    path: gen/db

    requires:
      - name: empsaldetails-db

resources:

  - name: empsaldetails-db
    type: com.sap.xs.hdi-container

    parameters:
      service: hana
      service-plan: hdi-shared

  - name: empsaldetails-xsuaa
    type: org.cloudfoundry.managed-service

    parameters:
      service: xsuaa
      service-plan: application
      path: xs-security.json

  - name: employee-destination
    type: org.cloudfoundry.managed-service

    parameters:
      service: destination
      service-plan: lite
